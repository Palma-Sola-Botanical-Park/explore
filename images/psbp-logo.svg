<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 52" width="220" height="52" role="img" aria-label="Palma Sola Botanical Park">
  <!-- Palm fronds -->
  <g fill="none" stroke="white" stroke-linecap="round" stroke-linejoin="round">
    <!-- Main trunk -->
    <path stroke-width="1.8" d="M18 48 Q17 36 20 24"/>
    <!-- Fronds -->
    <path stroke-width="1.4" d="M20 24 Q8 14 2 8"/>
    <path stroke-width="1.4" d="M20 24 Q12 10 10 2"/>
    <path stroke-width="1.4" d="M20 24 Q20 10 22 2"/>
    <path stroke-width="1.4" d="M20 24 Q26 12 32 6"/>
    <path stroke-width="1.4" d="M20 24 Q28 16 36 14"/>
    <!-- Small ground plant -->
    <path stroke-width="1.1" d="M14 46 Q8 40 4 38"/>
    <path stroke-width="1.1" d="M14 46 Q12 39 14 36"/>
    <path stroke-width="1.1" d="M14 46 Q18 40 22 38"/>
  </g>

  <!-- PALMA SOLA — small caps above -->
  <text x="46" y="16"
    font-family="'Source Sans 3', 'Segoe UI', sans-serif"
    font-size="8.5"
    font-weight="700"
    letter-spacing="2.5"
    fill="rgba(255,255,255,0.72)"
    text-anchor="start">PALMA SOLA</text>

  <!-- Botanical — large serif -->
  <text x="44" y="36"
    font-family="'Playfair Display', Georgia, serif"
    font-size="22"
    font-weight="700"
    fill="white"
    text-anchor="start">Botanical</text>

  <!-- Park — smaller serif below, right-aligned to match logo -->
  <text x="132" y="50"
    font-family="'Playfair Display', Georgia, serif"
    font-size="15"
    font-weight="400"
    fill="rgba(255,255,255,0.88)"
    text-anchor="start">Park</text>
</svg>
