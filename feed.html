<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Feed Detail · Palma Sola Botanical Park</title>
<style>
  :root{
    --ink:#1a3a1f; --ink-soft:#3f5a44; --muted:#7a8a7d;
    --surface:#faf8f3; --panel:#ffffff; --line:#e4ddcd; --sand:#ede8df;
    --gold:#c5922a;
    --ok:#3a8f4f;   --ok-bg:#e8f5ea;  --ok-line:#bfe0c6;
    --warn:#b07d16; --warn-bg:#f8efd6; --warn-line:#ecd79a;
    --bad:#b23a2e;  --bad-bg:#f7e4e0;  --bad-line:#e6bdb4;
    --gray:#9aa79c; --gray-bg:#eef0ec;
    --mono:"SF Mono",ui-monospace,"Cascadia Mono","Roboto Mono",Menlo,Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box} html,body{margin:0}
  body{background:var(--surface); color:var(--ink); font-family:var(--sans); font-size:14px; line-height:1.45; -webkit-font-smoothing:antialiased}
  a{color:inherit}
  .wrap{max-width:1040px; margin:0 auto; padding:20px 26px 60px}

  .back{display:inline-flex; align-items:center; gap:6px; font-size:12.5px; color:var(--ink-soft); text-decoration:none; margin-bottom:14px}
  .back:hover{color:var(--gold)}

  /* header */
  .head{border:1px solid var(--line); border-radius:14px; background:var(--panel); overflow:hidden; margin-bottom:16px}
  .head-top{display:flex; align-items:flex-start; gap:14px; padding:18px 22px}
  .head-top.is-ok{background:linear-gradient(0deg,#fff,var(--ok-bg)); border-bottom:1px solid var(--ok-line)}
  .head-top.is-warn{background:linear-gradient(0deg,#fff,var(--warn-bg)); border-bottom:1px solid var(--warn-line)}
  .head-top.is-bad{background:linear-gradient(0deg,#fff,var(--bad-bg)); border-bottom:1px solid var(--bad-line)}
  .head h1{margin:0; font-size:23px; letter-spacing:-.02em}
  .head .human{color:var(--ink-soft); font-size:13px; margin-top:3px}
  .pill{display:inline-flex; align-items:center; gap:6px; padding:4px 11px 4px 8px; border-radius:999px; font-size:12px; font-weight:650; white-space:nowrap; margin-left:auto; flex:0 0 auto}
  .pill .d{width:8px;height:8px;border-radius:50%}
  .pill.ok{background:var(--ok-bg); color:#1f6b34} .pill.ok .d{background:var(--ok)}
  .pill.warn{background:var(--warn-bg); color:#8a6210} .pill.warn .d{background:var(--warn)}
  .pill.bad{background:var(--bad-bg); color:#8f2c22} .pill.bad .d{background:var(--bad)}

  .countbar{display:flex; flex-wrap:wrap}
  .cb{flex:1 1 0; min-width:88px; padding:11px 16px; border-right:1px solid var(--line)}
  .cb:last-child{border-right:0}
  .cb .n{font-family:var(--mono); font-size:18px; font-weight:600}
  .cb .k{font-size:10.5px; text-transform:uppercase; letter-spacing:.06em; color:var(--muted); margin-top:1px}
  .cb .n.warn{color:var(--warn)} .cb .n.bad{color:var(--bad)}

  .banner{margin:0 0 16px; padding:12px 16px; border-radius:10px; font-size:13px; border:1px solid}
  .banner.bad{background:var(--bad-bg); border-color:var(--bad-line); color:#7e2a20}
  .banner.warn{background:var(--warn-bg); border-color:var(--warn-line); color:#7a560e}

  .feeds-nav{display:flex; gap:6px; flex-wrap:wrap; margin-bottom:16px}
  .feeds-nav a{font-size:12px; padding:4px 10px; border:1px solid var(--line); border-radius:999px; text-decoration:none; color:var(--ink-soft)}
  .feeds-nav a.cur{background:var(--ink); color:#fff; border-color:var(--ink)}
  .feeds-nav a .d{display:inline-block; width:7px; height:7px; border-radius:50%; margin-right:5px; vertical-align:middle}

  section{background:var(--panel); border:1px solid var(--line); border-radius:12px; margin-bottom:16px}
  section > h2{margin:0; padding:12px 16px; font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); border-bottom:1px solid var(--line); font-weight:700; display:flex; justify-content:space-between}
  section > h2 .meta{color:var(--muted); font-weight:600; letter-spacing:0; text-transform:none; font-size:11.5px}

  /* rules */
  .rule{padding:13px 16px; border-bottom:1px solid var(--sand)}
  .rule:last-child{border-bottom:0}
  .rule.gray{opacity:.62}
  .rule-top{display:flex; align-items:center; gap:10px}
  .rdot{width:9px;height:9px;border-radius:50%;flex:0 0 auto}
  .rdot.green{background:var(--ok)} .rdot.amber{background:var(--warn)} .rdot.gray{background:var(--gray)}
  .rfield{font-family:var(--mono); font-weight:600; font-size:13.5px}
  .rcheck{font-size:11px; color:var(--muted); background:var(--sand); padding:2px 7px; border-radius:6px}
  .rconseq{font-size:11px; padding:2px 7px; border-radius:6px; margin-left:2px}
  .rconseq.drop{background:var(--bad-bg); color:#8f2c22} .rconseq.warn{background:var(--warn-bg); color:#8a6210}
  .rcount{margin-left:auto; font-family:var(--mono); font-size:12px; color:var(--ink-soft)}
  .rcount.flag{color:var(--warn); font-weight:600}
  .rwhy{font-size:13px; color:var(--ink-soft); margin:6px 0 0 19px}
  .rex{margin:8px 0 0 19px; border-left:2px solid var(--warn-line); padding-left:11px}
  .rex .ex{font-size:12px; color:var(--ink-soft); padding:2px 0}
  .rex .ex b{font-family:var(--mono); font-weight:600; color:var(--ink)}
  .rdormant{font-size:12px; color:var(--muted); margin:5px 0 0 19px; font-style:italic}

  /* generic key/val + tables */
  .kv{display:flex; justify-content:space-between; padding:9px 16px; border-bottom:1px solid var(--sand); font-size:13px}
  .kv:last-child{border-bottom:0}
  .kv .k{color:var(--muted)} .kv .v{font-family:var(--mono)}
  .tbl{width:100%; border-collapse:collapse; font-size:12.5px}
  .tbl th{text-align:left; font-size:10.5px; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); padding:8px 16px; border-bottom:1px solid var(--line); font-weight:700}
  .tbl td{padding:7px 16px; border-bottom:1px solid var(--sand); font-family:var(--mono)}
  .tbl tr:last-child td{border-bottom:0}
  .drop td .why{font-family:var(--sans); color:var(--bad)}
  .tl{display:flex; gap:10px; align-items:center; padding:8px 16px; border-bottom:1px solid var(--sand); font-size:12.5px}
  .tl:last-child{border-bottom:0}
  .tl .when{font-family:var(--mono); color:var(--muted); min-width:92px}
  .tl .add{color:var(--ok)} .tl .chg{color:var(--ink-soft)} .tl .rem{color:var(--bad)}
  .links a{display:inline-block; font-size:12px; color:var(--ink-soft); text-decoration:none; padding:4px 11px; border:1px solid var(--line); border-radius:8px; margin:0 8px 8px 0}
  .links a:hover{border-color:var(--gold); color:var(--gold)}
  .links{padding:14px 16px 6px}
  .empty{padding:14px 16px; color:var(--muted); font-size:13px}
  .foot{margin-top:14px; color:var(--muted); font-size:11.5px; font-family:var(--mono)}
  .err{padding:40px 24px; text-align:center; color:var(--muted)}
  .err b{display:block; color:var(--ink); font-size:16px; margin-bottom:6px}
</style>
</head>
<body>
<div class="wrap" id="app"><div class="err"><b>Loading…</b></div></div>

<script>
const PUB = "data/published";
const STATE = {green:"ok", amber:"warn", red:"bad"};
const CHECK_LABEL = {
  required:"Required", iso_date:"Date format", iso_date_or_blank:"Date format (optional)",
  ge_field:"Date order", in_vocab:"Allowed values", url_or_blank:"URL format", fk:"Cross-reference",
};
const qs = new URLSearchParams(location.search);
const TAB = qs.get("tab");

function relTime(iso){
  if(!iso) return "—"; const t=new Date(iso); if(isNaN(t)) return "—";
  const s=Math.floor((Date.now()-t)/1000);
  if(s<45) return "just now"; if(s<3600) return Math.floor(s/60)+"m ago";
  if(s<86400) return Math.floor(s/3600)+"h ago";
  const d=Math.floor(s/86400); if(d===1) return "yesterday"; if(d<7) return d+"d ago";
  return t.toLocaleDateString(undefined,{month:"short",day:"numeric"});
}
const esc = s => String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

async function load(path){
  const r = await fetch(path,{cache:"no-store"});
  if(!r.ok) throw new Error(path.split("/").pop()+" "+r.status);
  return r.json();
}

function ruleHTML(r){
  const st = r.status; // green | amber | gray
  const drops = (r.severity==="error" && r.scope==="row");
  const conseq = st==="gray" ? "" :
    `<span class="rconseq ${drops?'drop':'warn'}">${drops?'drops the row':'flags a warning'}</span>`;
  const countTxt = st==="gray" ? "" :
    `<span class="rcount ${r.flagged?'flag':''}">${r.flagged?`${r.flagged} of ${r.evaluated} flagged`:`${r.passed}/${r.evaluated} ok`}</span>`;
  const dormant = st==="gray" ? `<div class="rdormant">Column "${esc(r.field)}" isn't in the sheet — this check is inactive (not a failure).</div>` : "";
  const ex = (r.examples&&r.examples.length) ? `<div class="rex">${
      r.examples.map(e=>`<div class="ex"><b>${esc(e.row)}</b> — ${esc(e.reason)}</div>`).join("")
    }</div>` : "";
  return `<div class="rule ${st==='gray'?'gray':''}">
    <div class="rule-top">
      <span class="rdot ${st}"></span>
      <span class="rfield">${esc(r.field)}</span>
      <span class="rcheck">${CHECK_LABEL[r.check]||r.check}</span>
      ${conseq}${countTxt}
    </div>
    <div class="rwhy">${esc(r.why)||"&nbsp;"}</div>
    ${dormant}${ex}
  </div>`;
}

function inventoryHTML(rows, identity){
  if(!rows || !rows.length) return `<div class="empty">No published rows.</div>`;
  const cols = (identity&&identity.length)?identity:Object.keys(rows[0]).slice(0,3);
  const cap = 200, shown = rows.slice(0,cap);
  const body = shown.map(row=>`<tr>${cols.map(c=>`<td>${esc(row[c])}</td>`).join("")}</tr>`).join("");
  const more = rows.length>cap ? `<div class="empty">…and ${rows.length-cap} more</div>` : "";
  return `<table class="tbl"><thead><tr>${cols.map(c=>`<th>${esc(c)}</th>`).join("")}</tr></thead><tbody>${body}</tbody></table>${more}`;
}

function feedsNav(health, cur){
  if(!health||!health.feeds) return "";
  const dot={green:"var(--ok)",amber:"var(--warn)",red:"var(--bad)"};
  return `<div class="feeds-nav">`+health.feeds.map(f=>
    `<a class="${f.tab===cur?'cur':''}" href="feed.html?tab=${encodeURIComponent(f.tab)}">
       <span class="d" style="background:${dot[f.status]||'#999'}"></span>${esc(f.tab)}</a>`
  ).join("")+`</div>`;
}

function render(d, pub, health){
  const st = STATE[d.status]||"ok";
  const c = d.counts||{};
  const vg = d.volume_guard||{};
  const sc = d.schema||{};

  let banner = "";
  if(d.status==="red"){
    banner = `<div class="banner bad"><b>Blocked — serving last-known-good.</b> ${esc(d.block_reason||"")}</div>`;
  } else if(c.quarantined){
    banner = `<div class="banner warn">${c.quarantined} row(s) quarantined this run — dropped from the published feed, the rest published.</div>`;
  }

  const rulesSorted = (d.rules||[]).slice().sort((a,b)=>{
    const rank={amber:0,green:1,gray:2}; return (rank[a.status]??9)-(rank[b.status]??9);
  });

  const dropped = (d.dropped_rows&&d.dropped_rows.length)
    ? `<table class="tbl drop"><thead><tr><th>Row</th><th>Why it was dropped</th></tr></thead><tbody>${
        d.dropped_rows.map(x=>`<tr><td>${esc(x.label)}</td><td class="why">${esc(x.reason)}</td></tr>`).join("")
      }</tbody></table>`
    : `<div class="empty">No rows dropped — every live row passed.</div>`;

  const tl = (d.timeline&&d.timeline.length)
    ? d.timeline.slice().reverse().map(t=>{
        const bits=[]; if(t.added)bits.push(`<span class="add">+${t.added}</span>`);
        if(t.changed)bits.push(`<span class="chg">~${t.changed}</span>`);
        if(t.removed)bits.push(`<span class="rem">−${t.removed}</span>`);
        return `<div class="tl"><span class="when">${relTime(t.at)}</span><span>${bits.join(" ")||"—"}</span></div>`;
      }).join("")
    : `<div class="empty">No edits in the last two weeks.</div>`;

  const L = d.links||{};
  return `
    <a class="back" href="data-health.html">← All feeds</a>
    ${feedsNav(health, d.tab)}
    <div class="head">
      <div class="head-top is-${st}">
        <div><h1>${esc(d.tab)}</h1><div class="human">${esc(d.human)}</div></div>
        <span class="pill ${st}"><span class="d"></span>${d.status==="green"?"green":d.status==="amber"?"amber":"blocked"}</span>
      </div>
      <div class="countbar">
        <div class="cb"><div class="n">${c.published??"—"}</div><div class="k">Published</div></div>
        <div class="cb"><div class="n">${c.live??"—"}</div><div class="k">Live</div></div>
        <div class="cb"><div class="n">${c.staged??"—"}</div><div class="k">Staged</div></div>
        <div class="cb"><div class="n">${c.dropped_display??0}</div><div class="k">Off / hidden</div></div>
        <div class="cb"><div class="n ${c.quarantined?'bad':''}">${c.quarantined??0}</div><div class="k">Quarantined</div></div>
        <div class="cb"><div class="n ${c.warned?'warn':''}">${c.warned??0}</div><div class="k">Warned</div></div>
      </div>
    </div>
    ${banner}

    <section>
      <h2>Checks <span class="meta">${(d.rules||[]).length} rules · sorted by status</span></h2>
      ${rulesSorted.map(ruleHTML).join("")}
    </section>

    <section>
      <h2>Volume guard <span class="meta">${vg.blocked?"BLOCKED":"ok"}</span></h2>
      <div class="kv"><span class="k">Floor (block below)</span><span class="v">${vg.min??1}</span></div>
      <div class="kv"><span class="k">Live rows this run</span><span class="v">${vg.live??"—"}</span></div>
      <div class="kv"><span class="k">Would publish</span><span class="v">${vg.published??"—"}</span></div>
      ${vg.reason?`<div class="empty">${esc(vg.reason)}</div>`:""}
    </section>

    <section>
      <h2>Dropped rows <span class="meta">${(d.dropped_rows||[]).length}</span></h2>
      ${dropped}
    </section>

    <section>
      <h2>Edit timeline <span class="meta">last 2 weeks</span></h2>
      ${tl}
    </section>

    <section>
      <h2>Schema <span class="meta">what this feed requires</span></h2>
      <div class="kv"><span class="k">Required columns (missing = blocks feed)</span><span class="v">${(sc.required_headers||[]).join(", ")||"—"}</span></div>
      <div class="kv"><span class="k">Identity (keys the edit diff)</span><span class="v">${(sc.identity||[]).join(", ")||"—"}</span></div>
      <div class="kv"><span class="k">Dropped display values</span><span class="v">${(sc.drop_when_display||[]).map(v=>v===""?'(blank)':v).join(", ")||"—"}</span></div>
      <div class="kv"><span class="k">Volume floor</span><span class="v">${sc.volume_min??1}</span></div>
    </section>

    <section>
      <h2>Current inventory <span class="meta">${pub?pub.length:0} published rows · joined live</span></h2>
      ${inventoryHTML(pub, sc.identity)}
    </section>

    <section class="links">
      ${L.sheet?`<a href="${esc(L.sheet)}" target="_blank" rel="noopener">Open sheet tab ↗</a>`:""}
      <a href="${esc(L.published||(PUB+"/"+d.tab+".json"))}" target="_blank" rel="noopener">Published JSON ↗</a>
      <a href="${esc(L.detail||(PUB+"/health/"+d.tab+".json"))}" target="_blank" rel="noopener">Raw detail JSON ↗</a>
    </section>
    <div class="foot">Reads ${PUB}/health/${esc(d.tab)}.json · joined with ${PUB}/${esc(d.tab)}.json · generated ${esc(d.generated_at)}</div>
  `;
}

(async function(){
  const app=document.getElementById("app");
  if(!TAB){
    let health=null; try{ health=await load(PUB+"/_health.json"); }catch(e){}
    app.innerHTML = `<a class="back" href="data-health.html">← All feeds</a>
      <div class="err"><b>Pick a feed</b>Add <code>?tab=events</code> to the URL, or choose one:</div>
      ${feedsNav(health,null)}`;
    return;
  }
  try{
    const d = await load(`${PUB}/health/${TAB}.json`);
    let pub=null, health=null;
    try{ pub = await load(`${PUB}/${TAB}.json`); }catch(e){}
    try{ health = await load(`${PUB}/_health.json`); }catch(e){}
    app.innerHTML = render(d, pub, health);
  }catch(err){
    const isFile = (typeof location!=="undefined" && location.protocol==="file:");
    const why = isFile
      ? `You opened this as a local file. Browsers block a <code>file://</code> page from reading the JSON — view it over the server (GitHub Pages) instead.`
      : `No detail file for "<b>${esc(TAB)}</b>" yet (${esc(err.message)}). It appears after the next meaningful sync, or the tab name is wrong.`;
    app.innerHTML = `<a class="back" href="data-health.html">← All feeds</a><div class="err"><b>Couldn't load feed detail</b>${why}</div>`;
  }
})();
</script>
</body>
</html>
